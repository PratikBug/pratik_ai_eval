<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Inventory API</title>
  </head>
  <body>
    <h1>Inventory items</h1>
    <ul>
      {% for item in items %}
      <li>{{ item.id }} — {{ item.name }}</li>
      {% else %}
      <li>No items yet</li>
      {% endfor %}
    </ul>
  </body>
</html>
