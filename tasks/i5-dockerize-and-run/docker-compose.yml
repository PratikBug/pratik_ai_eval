services:
  convert-api:
    build:
      context: ../i4-polyglot-service-pair-fastapi-plus-node-client/api
      dockerfile: ../../i5-dockerize-and-run/Dockerfile
    image: pratik-i5-convert-api:latest
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
