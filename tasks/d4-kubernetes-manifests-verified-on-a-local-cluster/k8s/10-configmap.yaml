apiVersion: v1
kind: ConfigMap
metadata:
  name: d4-app-config
  namespace: d4-jobs
  labels:
    app.kubernetes.io/name: d4-jobs
    app.kubernetes.io/component: config
data:
  API_PORT: "8090"
  DATABASE_HOST: postgres
  DATABASE_PORT: "5432"
  DATABASE_NAME: d2jobs
  DATABASE_USER: d2user
  LOG_LEVEL: info
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: d4-jobs
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
data:
  001_schema.sql: |
    CREATE TABLE IF NOT EXISTS jobs (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        name TEXT NOT NULL,
        status TEXT NOT NULL DEFAULT 'pending'
            CHECK (status IN ('pending', 'processing', 'done')),
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_jobs_status ON jobs (status);
  002_seed.sql: |
    INSERT INTO jobs (id, name, status) VALUES
        ('11111111-1111-4111-8111-111111111111', 'seed-import-orders', 'pending'),
        ('22222222-2222-4222-8222-222222222222', 'seed-send-notifications', 'pending'),
        ('33333333-3333-4333-8333-333333333333', 'seed-reconcile-balances', 'pending');
