apiVersion: v1
kind: Secret
metadata:
  name: d4-db-credentials
  namespace: d4-jobs
  labels:
    app.kubernetes.io/name: d4-jobs
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_USER: d2user
  POSTGRES_PASSWORD: d2pass
  POSTGRES_DB: d2jobs
  DATABASE_URL: postgresql://d2user:d2pass@postgres:5432/d2jobs
