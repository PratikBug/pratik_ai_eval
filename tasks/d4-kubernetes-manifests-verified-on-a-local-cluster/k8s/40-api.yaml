apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-api
  namespace: d4-jobs
  labels:
    app.kubernetes.io/name: job-api
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: job-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: job-api
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: pratik-d2-job-api:d4
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
          envFrom:
            - configMapRef:
                name: d4-app-config
            - secretRef:
                name: d4-db-credentials
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: d4-app-config
                  key: API_PORT
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: job-api
  namespace: d4-jobs
  labels:
    app.kubernetes.io/name: job-api
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/name: job-api
  ports:
    - name: http
      port: 8090
      targetPort: http
